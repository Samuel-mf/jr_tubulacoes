<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — JR Tubulação</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ── Admin-specific styles ── */
    .admin-wrapper {
      min-height: 100vh;
      background: var(--bg-primary);
    }

    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
    }

    .login-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 8px;
    }

    .login-card h1 span { color: var(--accent); }

    .login-card .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .login-card .login-error {
      display: none;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-sm);
      color: #EF4444;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    /* Dashboard */
    .dashboard { display: none; } 

    .admin-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-header .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-primary);
    }

    .admin-header .brand span { color: var(--accent); }

    .admin-header .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .admin-header .username {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .admin-header .btn-logout {
      padding: 8px 16px;
      font-size: 0.8rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #EF4444;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      transition: all var(--transition-fast);
    }

    .admin-header .btn-logout:hover {
      background: #EF4444;
      color: white;
    }

    /* Tabs */
    .admin-tabs {
      display: flex;
      gap: 4px;
      padding: 24px 0 0;
      border-bottom: 1px solid var(--dark-600);
      margin-bottom: 32px;
    }

    .tab-btn {
      padding: 12px 24px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tab-btn:hover { color: var(--text-primary); }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Admin table */
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .admin-table th,
    .admin-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--dark-600);
      font-size: 0.9rem;
    }

    .admin-table th {
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .admin-table td { color: var(--text-secondary); }

    .admin-table tr:hover td { 
      background: var(--bg-glass); 
    }

    .admin-table .desc-cell {
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .action-btns {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      transition: all var(--transition-fast);
      background: none;
    }

    .btn-edit {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-edit:hover {
      background: var(--accent);
      color: var(--dark-900);
    }

    .btn-delete {
      border-color: #EF4444;
      color: #EF4444;
    }

    .btn-delete:hover {
      background: #EF4444;
      color: white;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 36px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 24px;
    }

    .modal h2 span { color: var(--accent); }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .btn-cancel {
      padding: 10px 24px;
      background: var(--dark-600);
      border: 1px solid var(--dark-500);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all var(--transition-fast);
    }

    .btn-cancel:hover {
      background: var(--dark-500);
      color: var(--text-primary);
    }

    /* Gallery admin grid */
    .gallery-admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .gallery-admin-item {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      aspect-ratio: 4/3;
      background: var(--dark-700);
      border: 1px solid var(--border-subtle);
    }

    .gallery-admin-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery-admin-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }

    .gallery-admin-item:hover .overlay { opacity: 1; }

    /* Upload area */
    .upload-area {
      border: 2px dashed var(--dark-500);
      border-radius: var(--radius-md);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      margin-bottom: 24px;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: var(--bg-glass);
    }

    .upload-area svg {
      margin-bottom: 12px;
      color: var(--text-muted);
    }

    .upload-area p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .upload-area small {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .toolbar h3 {
      font-size: 1.1rem;
      font-weight: 700;
    }

    /* Toast notification */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      min-width: 280px;
      animation: slideInRight 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22C55E;
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #EF4444;
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Contacts tab */
    .contact-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 12px;
      transition: all var(--transition-fast);
    }

    .contact-card.unread {
      border-left: 3px solid var(--accent);
    }

    .contact-card .contact-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 8px;
    }

    .contact-card .contact-name {
      font-weight: 700;
      font-size: 1rem;
    }

    .contact-card .contact-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .contact-card .contact-meta {
      display: flex;
      gap: 20px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .contact-card .contact-message {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
      padding-top: 8px;
      border-top: 1px solid var(--dark-600);
    }

    @media (max-width: 768px) {
      .admin-table { font-size: 0.8rem; }
      .admin-table th, .admin-table td { padding: 10px 8px; }
      .gallery-admin-grid { grid-template-columns: repeat(2, 1fr); }
      .modal { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="admin-wrapper">
    <!-- ══════════ LOGIN ══════════ -->
    <div class="login-wrapper" id="loginWrapper">
      <div class="login-card">
        <h1>JR <span>Admin</span></h1>
        <p class="subtitle">Painel de Administração</p>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="loginUser">Usuário</label>
            <input type="text" id="loginUser" placeholder="admin" required />
          </div>
          <div class="form-group">
            <label for="loginPass">Senha</label>
            <input type="password" id="loginPass" placeholder="••••••••" required />
          </div>
          <div class="form-submit" style="margin-top:24px;">
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
              Entrar
            </button>
          </div>
        </form>

        <p style="text-align:center;margin-top:24px;font-size:0.8rem;color:var(--text-muted);">
          <a href="/" style="color:var(--text-muted);">← Voltar ao site</a>
        </p>
      </div>
    </div>

    <!-- ══════════ DASHBOARD ══════════ -->
    <div class="dashboard" id="dashboard">
      <header class="admin-header">
        <div class="container">
          <div class="brand">JR <span>Admin</span></div>
          <div class="user-info">
            <span class="username" id="adminUsername">admin</span>
            <button class="btn-logout" id="logoutBtn">Sair</button>
            <a href="/" class="btn-sm btn-edit" style="text-decoration:none;">Ver Site</a>
          </div>
        </div>
      </header>

      <div class="container" style="padding-top:8px; padding-bottom:60px;">
        <div class="admin-tabs">
          <button class="tab-btn active" data-tab="services">Serviços</button>
          <button class="tab-btn" data-tab="gallery">Galeria</button>
          <button class="tab-btn" data-tab="contacts">Contatos</button>
        </div>

        <!-- Services Tab -->
        <div class="tab-content active" id="tab-services">
          <div class="toolbar">
            <h3>Gerenciar Serviços</h3>
            <button class="btn btn-primary" id="addServiceBtn" style="padding:10px 20px;font-size:0.85rem;">
              + Novo Serviço
            </button>
          </div>
          <table class="admin-table" id="servicesTable">
            <thead>
              <tr>
                <th>Ordem</th>
                <th>Título</th>
                <th>Descrição</th>
                <th>Ativo</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="servicesTableBody"></tbody>
          </table>
        </div>

        <!-- Gallery Tab -->
        <div class="tab-content" id="tab-gallery">
          <div class="toolbar">
            <h3>Gerenciar Galeria</h3>
          </div>

          <div class="upload-area" id="uploadArea">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
            <p>Clique ou arraste imagens para fazer upload</p>
            <small>JPG, PNG, WebP — máx. 10MB</small>
            <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" />
          </div>

          <div class="form-row" id="uploadMeta" style="display:none;margin-bottom:20px;">
            <div class="form-group">
              <label>Legenda</label>
              <input type="text" id="uploadCaption" placeholder="Descrição da imagem" />
            </div>
            <div class="form-group">
              <label>Serviço relacionado</label>
              <select id="uploadService">
                <option value="">Nenhum</option>
              </select>
            </div>
          </div>

          <div class="gallery-admin-grid" id="adminGalleryGrid"></div>
        </div>

        <!-- Contacts Tab -->
        <div class="tab-content" id="tab-contacts">
          <div class="toolbar">
            <h3>Contatos / Orçamentos</h3>
          </div>
          <div id="contactsList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════ SERVICE MODAL ══════════ -->
  <div class="modal-overlay" id="serviceModal">
    <div class="modal">
      <h2 id="modalTitle">Novo <span>Serviço</span></h2>
      <form id="serviceForm">
        <input type="hidden" id="serviceId" />
        <div class="form-group">
          <label>Título *</label>
          <input type="text" id="svcTitle" placeholder="Nome do serviço" required />
        </div>
        <div class="form-group">
          <label>Descrição *</label>
          <textarea id="svcDesc" placeholder="Descrição do serviço" required style="min-height:100px;"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Ícone</label>
            <select id="svcIcon">
              <option value="flame">🔥 Chama</option>
              <option value="building">🏢 Edifício</option>
              <option value="droplets">💧 Água</option>
              <option value="wind">💨 Vento</option>
              <option value="factory">🏭 Fábrica</option>
              <option value="wrench">🔧 Ferramenta</option>
            </select>
          </div>
          <div class="form-group">
            <label>Ordem</label>
            <input type="number" id="svcOrder" placeholder="1" min="0" />
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal('serviceModal')">Cancelar</button>
          <button type="submit" class="btn btn-primary" style="padding:10px 24px;font-size:0.85rem;">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/admin.js"></script>
</body>
</html>
